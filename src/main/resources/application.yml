spring:
  application:
    name: api-rate-limiter

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/ratelimiter
    username: ratelimiter
    password: ratelimiter123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis (Phase 2 — distributed rate limiting)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

# Rate Limiter Configuration
rate-limiter:
  # Algorithm: TOKEN_BUCKET or SLIDING_WINDOW
  algorithm: TOKEN_BUCKET
  # Default limits (used when no specific config found in DB)
  default-limit: 100
  default-window-seconds: 60
  default-refill-rate: 10   # tokens per second (Token Bucket only)
  # Phase 2: use Redis for distributed rate limiting (false = in-memory, local dev)
  use-redis: true
  # Phase 3: Circuit Breaker
  circuit-breaker:
    enabled: true
    failure-threshold: 5         # consecutive Redis failures to trip OPEN
    window-seconds: 60           # monitoring window (metadata)
    half-open-timeout-seconds: 30  # seconds in OPEN before probing
    fail-open: true              # true=allow traffic when OPEN, false=block all

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator — expose health, prometheus, metrics endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

server:
  port: 8080
